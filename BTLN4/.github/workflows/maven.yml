name: Java CI/CD (Installers)

on:
  push:
    branches: [ "main", "dev" ]

  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      - name: Build Fat JAR
        run: mvn -B package -DskipTests

  create-installers:
    needs: build
    strategy:
      matrix:
        include:
          - os: windows-latest
            type: exe
          - os: ubuntu-latest
            type: deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR
        run: mvn -B package -DskipTests

      # Create the Installer
      - name: Build Installer
        run: |
          jpackage --type ${{ matrix.type }} \
            --dest dist/ \
            --name "AuctionApp" \
            --input target/ \
            --main-jar app-1.0-SNAPSHOT.jar \
            --main-class com.auction.Main \
            --description "Real-time Auction Client" \
            --vendor "MyAuctionTeam"
          # Note: On Windows, use `backticks` for line breaks if running in PowerShell, 
          # but GitHub Actions handles the \ style in most shells.

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AuctionApp-${{ matrix.type }}
          path: dist/*