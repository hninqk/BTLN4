name: Java CI/CD (Installers)

on:
  push:
    branches: [ "main", "dev" ]

  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BTLN4
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      - name: Build Fat JAR (skip Checkstyle + Tests)
        run: mvn -B package -DskipTests -Dcheckstyle.skip=true

  create-installers:
    needs: build
    strategy:
      matrix:
        include:
          - os: windows-latest
            type: exe
          - os: ubuntu-latest
            type: deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: BTLN4

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR (skip Checkstyle + Tests)
        run: mvn -B package -DskipTests -Dcheckstyle.skip=true

      # ── Linux installer ──────────────────────────────────────────────────────
      - name: Build Linux Installer
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --type deb \
            --dest dist/ \
            --name "AuctionApp" \
            --input target/ \
            --main-jar app-1.0-SNAPSHOT.jar \
            --main-class com.auction.Main \
            --app-version "1.0.0" \
            --description "Real-time Auction Client" \
            --vendor "MyAuctionTeam"

      # ── Windows installer ────────────────────────────────────────────────────
      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: >
          jpackage
          --type exe
          --dest dist/
          --name "AuctionApp"
          --input target/
          --main-jar app-1.0-SNAPSHOT.jar
          --main-class com.auction.Main
          --app-version "1.0.0"
          --description "Real-time Auction Client"
          --vendor "MyAuctionTeam"
          --win-dir-chooser
          --win-menu

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AuctionApp-${{ matrix.type }}
          path: BTLN4/dist/*