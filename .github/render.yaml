services:
  - type: web
    name: auction-server
    env: docker
    plan: free
    region: singapore
    dockerCommand: java -Dauction.server.url=ws://0.0.0.0:7000/auction -cp /app/app.jar com.auction.ServerMain
    envVars:
      - key: PORT
        value: 7000
      - key: JAVA_OPTS
        value: "-Xmx512m"
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: auction-db-postgres
          property: jdbcInternalUrl

databases:
  - name: auction-db-postgres
    plan: free
    region: singapore
