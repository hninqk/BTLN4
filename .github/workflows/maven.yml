name: Java CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:

  # ── 1. Build & upload the client JAR (what friends download and run) ────────
  build-client-jar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BTLN4
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build client JAR (skip Checkstyle + Tests)
        run: |
          mvn -B package \
            -DskipTests \
            -Dcheckstyle.skip=true

      # Upload the fat JAR so friends can download it from the Actions tab
      - name: Upload client JAR
        uses: actions/upload-artifact@v4
        with:
          name: AuctionApp-client-jar
          path: BTLN4/target/app-1.0-SNAPSHOT.jar
          retention-days: 30

  # ── 2. Build native installers (optional, runs after JAR build) ─────────────
  create-installers:
    needs: build-client-jar
    strategy:
      matrix:
        include:
          - os: windows-latest
            type: exe
          - os: ubuntu-latest
            type: deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: BTLN4
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR (skip Checkstyle + Tests)
        run: |
          mvn -B package \
            -DskipTests \
            -Dcheckstyle.skip=true

      # ── Linux .deb installer ─────────────────────────────────────────────────
      - name: Build Linux Installer
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage \
            --type deb \
            --dest dist/ \
            --name "AuctionApp" \
            --linux-package-name auctionapp \
            --input target/ \
            --main-jar app-1.0-SNAPSHOT.jar \
            --main-class com.auction.Launcher \
            --app-version "1.0.0" \
            --description "Real-time Auction Client" \
            --vendor "MyAuctionTeam"

      # ── Windows .exe installer ───────────────────────────────────────────────
      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: |
          jpackage \
            --type exe \
            --dest dist/ \
            --name "AuctionApp" \
            --input target/ \
            --main-jar app-1.0-SNAPSHOT.jar \
            --main-class com.auction.Launcher \
            --app-version "1.0.0" \
            --description "Real-time Auction Client" \
            --vendor "MyAuctionTeam" \
            --win-dir-chooser \
            --win-menu

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AuctionApp-${{ matrix.type }}
          path: BTLN4/dist/*