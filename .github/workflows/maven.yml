name: Java CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:

  # ── 1. Build & upload the client JAR (what friends download and run) ────────
  build-client-jar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BTLN4
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Build client JAR (skip Checkstyle + Tests)
        run: |
          mvn -B package \
            -DskipTests \
            -Dcheckstyle.skip=true

      # Upload the fat JAR so friends can download it from the Actions tab
      - name: Upload client JAR
        uses: actions/upload-artifact@v4
        with:
          name: AuctionApp-client-jar
          path: BTLN4/target/app-1.0-SNAPSHOT.jar
          retention-days: 30